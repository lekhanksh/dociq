version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env.development.example
    environment:
      DATABASE_URL: sqlite:///./dociq.db
      VECTOR_BACKEND: memory
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_logs:/app/logs

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 8080"
    ports:
      - "8080:8080"
    environment:
      VITE_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app

volumes:
  backend_logs:
