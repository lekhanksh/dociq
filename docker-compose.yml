services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: dociq
      POSTGRES_PASSWORD: localpassword
      POSTGRES_DB: dociq_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      ENV: development
      DATABASE_URL: postgresql://dociq:localpassword@db:5432/dociq_dev
      JWT_SECRET: local-dev-secret-minimum-32-characters-long
      S3_BUCKET_NAME: dociq-documents-dev
      AWS_REGION: us-east-1
      BEDROCK_MODEL_ID: anthropic.claude-3-5-sonnet-20241022-v2:0
    depends_on:
      - db
    volumes:
      - ./backend:/app

volumes:
  pgdata:
