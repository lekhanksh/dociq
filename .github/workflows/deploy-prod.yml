name: Deploy to Production

on:
  push:
    branches: [main]    # only merges from develop via PR hit this

jobs:
  test:
    uses: ./.github/workflows/test.yml

  deploy-backend-prod:
    needs: test
    runs-on: ubuntu-latest
    environment: production          # REQUIRES manual approval in GitHub
    steps:
      - uses: actions/checkout@v4

      - name: Deploy backend to prod EC2
        env:
          EC2_HOST: ${{ secrets.PROD_EC2_HOST }}
          EC2_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          echo "$EC2_KEY" > /tmp/key && chmod 400 /tmp/key
          rsync -avz -e "ssh -i /tmp/key -o StrictHostKeyChecking=no" \
            backend/ ec2-user@$EC2_HOST:/app/backend/
          ssh -i /tmp/key -o StrictHostKeyChecking=no ec2-user@$EC2_HOST \
            "cd /app/backend && alembic upgrade head && sudo systemctl restart dociq"
          rm /tmp/key

      - name: Health check prod
        run: |
          sleep 8
          curl --fail https://${{ secrets.PROD_ALB_DNS }}/health
          echo "Production backend healthy"

  deploy-frontend-prod:
    needs: test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend (production)
        run: |
          cd frontend && npm ci
          VITE_API_URL=https://${{ secrets.PROD_ALB_DNS }} npm run build

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Sync to S3 prod
        run: |
          aws s3 sync frontend/dist/ s3://dociq-frontend-prod --delete \
            --cache-control "public, max-age=31536000" --exclude "index.html"
          aws s3 cp frontend/dist/index.html s3://dociq-frontend-prod/index.html \
            --cache-control "no-cache"

      - name: Invalidate CloudFront prod
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.PROD_CLOUDFRONT_ID }} \
            --paths "/*"
