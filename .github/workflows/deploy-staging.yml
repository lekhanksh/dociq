name: Deploy to Staging

on:
  push:
    branches: [develop]

jobs:
  test:
    uses: ./.github/workflows/test.yml   # reuse test workflow

  deploy-backend-staging:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy backend to staging EC2
        env:
          EC2_HOST: ${{ secrets.STAGING_EC2_HOST }}
          EC2_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          echo "$EC2_KEY" > /tmp/key && chmod 400 /tmp/key
          rsync -avz -e "ssh -i /tmp/key -o StrictHostKeyChecking=no" \
            backend/ ec2-user@$EC2_HOST:/app/backend/
          ssh -i /tmp/key -o StrictHostKeyChecking=no ec2-user@$EC2_HOST \
            "cd /app/backend && alembic upgrade head && sudo systemctl restart dociq"
          rm /tmp/key

      - name: Health check staging
        run: |
          sleep 8
          curl --fail https://${{ secrets.STAGING_ALB_DNS }}/health
          echo "Staging backend healthy"

  deploy-frontend-staging:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend (staging)
        run: |
          cd frontend && npm ci
          VITE_API_URL=https://${{ secrets.STAGING_ALB_DNS }} npm run build

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Sync to S3 staging
        run: |
          aws s3 sync frontend/dist/ s3://dociq-frontend-staging --delete
          aws s3 cp frontend/dist/index.html s3://dociq-frontend-staging/index.html \
            --cache-control "no-cache"

      - name: Invalidate CloudFront staging
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.STAGING_CLOUDFRONT_ID }} \
            --paths "/*"

      - name: Post staging URL to PR comment
        run: echo "Staging deployed → https://${{ secrets.STAGING_CLOUDFRONT_URL }}"
