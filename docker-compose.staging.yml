version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env.staging.example
    environment:
      VECTOR_BACKEND: pgvector
    ports:
      - "8000:8000"
    restart: unless-stopped
    logging:
      options:
        max-size: "10m"
        max-file: "5"
